<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Login |Go World </title>
</head>

<body>
    <nav>
        <div class="logo">Go World</div>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="beaches.html">BEACHES</a></li>
            <li><a href="trips.html">TRIPS</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
        <div class="nav-right">
            <a href="login.html" class="nav__btn">Get in touch</a>
        </div>
    </nav>

    <div class="page-container">
        <h1 class="page-title">Sign<br><span>In</span></h1>

        <div class="form-card">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Your Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-submit">Login</button>
            </form>
            <div class="contact-info">
                <p>New here? <a href="signup.html" style="color: var(--primary);">Create an account</a></p>
            </div>
        </div>
    </div>
</body>

</html>
